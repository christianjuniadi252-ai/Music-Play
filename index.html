<!DOCTYPE html>  <html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Music Chat Player</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
    font-family:sans-serif;  
}  
  
body{  
    background:#121212;  
    color:white;  
    height:100vh;  
    display:flex;  
    flex-direction:column;  
}  

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    background:#121212;
    color:white;
}
  
header{
    display: flex;
    background:#1f1f1f;
    padding:15px;
    justify-content: space-between;
    font-size:20px;  
    font-weight:bold;  
}  
  
.chat-container{  
    flex:1;  
    overflow-y:auto;  
    padding:15px;  
    display:flex;  
    flex-direction:column;  
    gap:10px;  
}  
  
.message{  
    max-width:80%;  
    padding:10px 14px;  
    border-radius:12px;  
    word-wrap:break-word;  
}  
  
.user{  
    background:#2563eb;  
    align-self:flex-end;  
}  
  
.bot{  
    background:#2d2d2d;  
    align-self:flex-start;  
}  
  
.player{  
    background:#1a1a1a;  
    padding:15px;  
    border-top:1px solid #333;  
}  
  
#playerFrame{  
    width:100%;  
    aspect-ratio:16/9;  
    border:none;  
    border-radius:10px;  
    display:none;  
}  
  
.input-area{
    display:flex;
    gap:10px;  
    padding:15px;  
    background:#1f1f1f;  
}  
  
input{
    flex:1;  
    padding:12px;  
    border:none;  
    border-radius:8px;  
    outline:none;  
    background:#2d2d2d;  
    color:white;  
}  
  
button{  
    padding:12px 20px;  
    border:none;  
    border-radius:8px;  
    background:#22c55e;  
    color:white;  
    cursor:pointer;  
}  
  
button:hover{  
    opacity:.9;  
}  

#loginContainer{
    padding:10px;
    text-align:center;
}

#userInfo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 15px;
    background:#1f1f1f;
    border-bottom:1px solid #333;
    margin-top: -20px;
}

.account{
    display:flex;
    align-items:center;
    gap:10px;
}

#avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

#username{
    color:white;
    font-weight:600;
    font-size:16px;
}

#replyPreview{
    display:none;
    padding:10px;
    background:#202020;
    border-left:4px solid #22c55e;
    justify-content:space-between;
    align-items:center;
}

#replyText{
    flex:1;
    color:#ccc;
}

#cancelReply{
    background:#ef4444;
}

.msg{
    display:flex;
    gap:10px;
}

.msg-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
}

.msg-content{
    flex:1;
    background: #2b2b2b;
    padding: 8px;
    padding-left: 12px;
    border-radius: 8px;
}

.msg-header{
    display:flex;
    gap:10px;
    align-items:center;
}

.msg-name{
    color:white;
    font-weight:bold;
}

.msg-time{
    color:#888;
    font-size:12px;
}

.msg-text{
    color:#d1d5db;
    margin-top:4px;
}

.reply-box{
    border-left:3px solid #555;
    padding-left:8px;
    margin-bottom:6px;
    color:#999;
    font-size:13px;
    background: rgba(0,0,0,0.2);
}

.header-buttons{
    display:flex;
    gap:10px;
}

.header-buttons button{
    width:42px;
    height:42px;
    display: flex;
    justify-content: center;
    align-items: center;
    border:none;
    border-radius:10px;
    background:#2d2d2d;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
    padding: 0;
}

.header-buttons button:hover{
    background:#3a3a3a;
}

.header-buttons button svg{
    width:22px;
    height:22px;
    stroke-width:2;
}
</style>
</head>  
<body>
<div id="loginContainer">
    <button id="loginBtn">
        Login Google
    </button>
</div>

<div id="userInfo" style="display:none">

    <div class="account">
        <img id="avatar" src="" alt="Avatar">
        <span id="username">Username</span>
    </div>

    <div class="header-buttons">
        <button id="playlistBtn">
            <i data-lucide="list-music"></i>
        </button>
        
        <button id="settingBtn">
            <i data-lucide="settings"></i>
        </button>
    </div>

</div>

<div id="replyPreview" style="display:none">

    <div id="replyText">
    </div>

    <button id="cancelReply">
        ✕
    </button>

</div>

<div class="chat-container" id="chat">

</div>

<div class="player">

    <iframe
        id="playerFrame"
        allow="autoplay"
        allowfullscreen>
    </iframe>

</div>

<div class="input-area">

    <input
        id="commandInput"
        placeholder="Pesan atau /play URL">

    <button id="sendBtn">
        <i data-lucide="send-horizontal"></i>
    </button>

</div>

<script
type="module"
src="app.js">
</script>
<script>lucide.createIcons();</script>
</body>
</html>
