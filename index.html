<!DOCTYPE html>  <html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Music Chat Player</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
    font-family:sans-serif;  
}  
  
html,
body{
    margin:0;
    width:100%;
    height:100%;
}

body{
    display:flex;
    flex-direction:column;
    min-height:100dvh;
    background:#121212;
    color:white;
    overflow:hidden;
}
  
header {
    display: flex;
    background:#1f1f1f;
    padding:15px;
    justify-content: space-between;
    font-size:20px;  
    font-weight:bold;  
}  
  
.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    min-height:0;
    padding:15px;
    gap:16px;
}
  
.message{  
    max-width:80%;  
    padding:10px 14px;  
    border-radius:12px;  
    word-wrap:break-word;  
}  

.message-content{
    flex:1;
    white-space:pre-wrap;
    word-break:break-word;
}

.edited-label{
    align-self:flex-end;
    font-size:11px;
    color:#999;
    flex-shrink:0;
    margin-left:4px;
}
  
.user{  
    background:#2563eb;  
    align-self:flex-end;  
}  
  
.bot{  
    background:#2d2d2d;  
    align-self:flex-start;  
}  
  
.player{  
    background:#1a1a1a;  
    padding:15px;  
    border-top:1px solid #333;  
}  
  
#playerFrame{
    width:100%;
    aspect-ratio:16/9;
    display:none;
    overflow:hidden;
    border-radius:10px;
}
  
.input-area{
    display:flex;
    align-items: flex-end;
    gap:10px;  
    background:#1f1f1f;
    flex-shrink:0;
}  
  
input{
    flex:1;  
    padding:12px;  
    border:none;  
    border-radius:8px;  
    outline:none;  
    background:#2d2d2d;  
    color:white;  
}  
  
button{  
    padding:12px 20px;  
    border:none;  
    border-radius:8px;  
    background:#22c55e;  
    color:white;  
    cursor:pointer;  
}  
  
button:hover{  
    opacity:.9;  
}  

#loginContainer{
    padding:10px;
    text-align:center;
}

#userInfo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 15px;
    background:#1f1f1f;
    border-bottom:1px solid #333;
    margin-top: -20px;
}

.account{
    display:flex;
    align-items:center;
    gap:10px;
}

#avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

#username{
    color:white;
    font-weight:600;
    font-size:16px;
}

#replyPreview{
    display:none;
    padding:10px;
    align-items: flex-start;
    gap: 16px;
    background: rgba(0,0,0,0.2);
    border-left:4px solid #555;
    border-radius: 6px;
    justify-content:space-between;
    align-items:center;
    
    word-break:break-word;
}

#replyText{
    flex:1;
    color:#ccc;
}

#cancelReply{
    width:28px;
    height:28px;
    padding:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:transparent;
    color:#aaa;
    border:none;
    border-radius:6px;
    flex-shrink:0;
}

#cancelReply:hover{
    background:#333;
    color:#fff;
}

#cancelReply svg{
    width:18px;
    height:18px;
}

.msg{
    position:relative;
    display:flex;
    gap:10px;
    
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
}

.msg-group {
    margin-top:-12px;
}

.msg.own{
    justify-content:flex-end;
}

.msg.own .msg-content{
    background: #144D37;
    color:white;
}

.msg.own .msg-avatar,.msg-avatar-placeholder{
    order:2;
    margin-right: -8px;
}

.msg.own .msg-avatar-placeholder{
    order:2;
}

.msg.own .msg-content{
    order:1;
}

.msg.own .reply-icon{
    left:auto;
    right:40px;
}

.msg-avatar, .msg-avatar-placeholder {
    width:32px;
    height:32px;
    flex-shrink: 0;
    border-radius:50%;
    margin-left: -6px;
}

.msg-content{
    width: fit-content;
    max-width: 70%;
    background: #2b2b2b;
    padding: 8px;
    padding-left: 6px;
    padding-right: 10px;
    border-radius: 8px;
}

.msg-header{
    display:flex;
    gap:10px;
    justify-content: space-between;
    align-items:center;
}

.msg-name{
    color:white;
    font-weight:bold;
    margin-bottom:4px;
    margin-left:6px;
}

.msg-time{
    color:#888;
    font-size:12px;
}

.msg-text{
    gap:6px;
    color:#d1d5db;
    margin-left:6px;
    
    word-break:break-word;
}

.reply-box{
    border-left: 3px solid rgba(255,255,255,0.2);
    padding: 8px;
    margin-top:6px;
    margin-bottom:6px;
    margin-left: 16px;
    color:#999;
    border-radius: 4px;
    font-size:13px;
    background: rgba(0,0,0,0.2);
    
    word-break:break-word;
}

.header-buttons{
    display:flex;
    gap:10px;
}

.header-buttons button{
    width:42px;
    height:42px;
    display: flex;
    justify-content: center;
    align-items: center;
    border:none;
    border-radius:10px;
    background:#2d2d2d;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:.2s;
    padding: 0;
}

.header-buttons button:hover{
    background:#3a3a3a;
}

.header-buttons button svg{
    width:22px;
    height:22px;
    stroke-width:2;
}

#sendBtn {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 8px;
}

.bottom {
  display: flex;
  flex-direction: column;
  background: #1f1f1f;
  padding: 15px;
  gap: 15px;
}

#commandInput{
    flex:1;
    min-height:36px;
    max-height:120px;

    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;

    background:#2d2d2d;
    color:white;

    resize:none;
    line-height:20px;
}

.date-separator{
    align-self:center;
    margin:0 0 10px;

    padding:6px 12px;

    background:#2d2d2d;
    color:#bbb;

    border-radius:999px;

    font-size:12px;
    font-weight:600;
}

.reply-icon{
    position:absolute;

    left:40px;
    top:50%;
    transform:translateY(-50%) scale(.6);

    width:28px;
    height:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    pointer-events:none;

    transition:
        opacity .15s ease,
        transform .15s ease;
}

.menu-overlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:flex-end;
    flex-direction:column;

    z-index:9999;

}

.menu-sheet{

    background:#222;

    border-radius:18px 18px 0 0;

    padding:20px;

}

.menu-sheet button{

    width:100%;

    display:flex;

    align-items:center;

    gap:14px;

    padding:15px;

    background:none;

    border:none;

    color:white;

    font-size:16px;

}

.edited-label{
    font-size:11px;
    color:#999;
    margin-left:8px;
    font-style:italic;
}

.menu-preview{
    margin-bottom:15px;
}

.menu-preview .reply-box{
    margin:0;
    padding:10px;
    border-left:4px solid #555;
    background:rgba(255,255,255,.05);
    border-radius:6px;

    word-break:break-word;
}

.msg.bot .msg-content{
    background:#1f2937;
    border:1px solid #3b82f6;
}

.msg.bot .msg-text{
    color:#ffffff;
}

.msg.bot .msg-name{
    color:#60a5fa;
}

.msg.bot{
    padding:0;
    background:none !important;
}

.msg-text code{
    background:#111827;
    color:#7dd3fc;
    padding:2px 6px;
    border-radius:6px;
    font-family:monospace;
    font-size:.9em;
}

.jump-highlight .msg-content{
    animation:jumpFlash 1.5s;
}

@keyframes jumpFlash{

    0%{
        box-shadow:0 0 0 0 rgba(255,255,255,.8);
    }

    50%{
        box-shadow:0 0 0 8px rgba(255,255,255,.15);
    }

    100%{
        box-shadow:0 0 0 0 rgba(255,255,255,0);
    }

}
</style>
</head>  
<body>
<div id="loginContainer">
    <button id="loginBtn">
        Login Google
    </button>
</div>

<div id="userInfo" style="display:none">

    <div class="account">
        <img id="avatar" src="" alt="Avatar">
        <span id="username">Username</span>
    </div>

    <div class="header-buttons">
        <button id="refreshBtn">
            <i data-lucide="rotate-cw"></i>
        </button>
        
        <button id="playlistBtn">
            <i data-lucide="list-music"></i>
        </button>
        
        <button id="settingBtn">
            <i data-lucide="settings"></i>
        </button>
    </div>

</div>


<div class="chat-container" id="chat">

</div>

<div class="player">

  <div id="playerFrame"></div>

</div>

<div class="bottom">
  <div id="replyPreview">
    <div id="replyText"></div>

    <button id="cancelReply">
        <i data-lucide="x"></i>
    </button>
  </div>
  <div class="input-area">
    <textarea
      id="commandInput"
      rows="1"
      placeholder="Pesan atau /play URL"></textarea>

    <button id="sendBtn">
        <i data-lucide="send-horizontal"></i>
    </button>
  </div>
</div>

<div id="menuOverlay" class="menu-overlay">
    <div class="menu-sheet">
        <div id="menuPreview" class="menu-preview"></div>
        <button id="copyBtn">
            <i data-lucide="copy"></i>
            Copy
        </button>
        <button id="editBtn">
            <i data-lucide="pencil"></i>
            Edit
        </button>
        <button id="deleteBtn">
            <i data-lucide="trash-2"></i>
            Hapus
        </button>
        <button id="replyBtn">
            <i data-lucide="reply"></i>
            Reply
        </button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module" src="app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
